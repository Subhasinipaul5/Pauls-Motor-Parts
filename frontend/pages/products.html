  <script src="/assets/js/app.js"></script>
  <script>
    // Products page specific logic
    let currentCategory = 'All', currentSort = 'newest', currentSearch = '', currentPage = 1;
    let searchTimer;

    document.addEventListener('DOMContentLoaded', () => {
      loadCategoryFilters();
      loadProducts();
      const urlCat = new URLSearchParams(window.location.search).get('category');
      if (urlCat) { currentCategory = urlCat; }
    });

    async function loadCategoryFilters() {
      const row = document.getElementById('filter-row');
      if (!row) return;
      try {
        const r = await fetch('/api/products/categories');
        const d = await r.json();
        row.innerHTML = `<button class="filter-btn ${currentCategory==='All'?'active':''}" onclick="setCategory('All',this)">All</button>`;
        (d.categories||[]).forEach(c => {
          const btn = document.createElement('button');
          btn.className = `filter-btn ${currentCategory===c?'active':''}`;
          btn.textContent = c;
          btn.onclick = () => setCategory(c, btn);
          row.appendChild(btn);
        });
      } catch {}
    }

    function setCategory(cat, btn) {
      currentCategory = cat; currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      loadProducts();
    }

    function applySort(val) { currentSort = val; currentPage = 1; loadProducts(); }
    function debounceSearch(val) { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentSearch = val; currentPage = 1; loadProducts(); }, 400); }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      const count = document.getElementById('results-count');
      if (!grid) return;
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;"><div style="font-size:2rem;margin-bottom:12px;">⏳</div><p style="color:rgba(255,255,255,0.3);">Loading parts...</p></div>';
      try {
        const params = new URLSearchParams({ sort: currentSort, page: currentPage, limit: 24 });
        if (currentCategory !== 'All') params.set('category', currentCategory);
        if (currentSearch) params.set('search', currentSearch);
        const r = await fetch('/api/products?' + params);
        const d = await r.json();
        if (!d.products?.length) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;"><div style="font-size:3rem;margin-bottom:12px;">🔍</div><p style="color:rgba(255,255,255,0.3);">No parts found. Try a different search.</p></div>';
          if (count) count.textContent = '';
          return;
        }
        if (count) count.textContent = `Showing ${d.products.length} of ${d.total} parts`;
        grid.innerHTML = d.products.map(p => productCard(p)).join('');
        renderPagination(d.page, d.pages);
      } catch(e) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#f87171;">Error loading products. Please refresh.</div>';
      }
    }

    function renderPagination(page, pages) {
      const el = document.getElementById('pagination');
      if (!el || pages <= 1) { if(el) el.innerHTML=''; return; }
      let html = '';
      for (let i = 1; i <= pages; i++) {
        html += `<button onclick="goPage(${i})" style="background:${i===page?'#4ade80':'rgba(255,255,255,0.08)'};color:${i===page?'#000':'#fff'};border:1px solid ${i===page?'#4ade80':'rgba(255,255,255,0.15)'};padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:${i===page?700:400};">${i}</button>`;
      }
      el.innerHTML = html;
    }

    function goPage(p) { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  </script>
</body>
</html>
